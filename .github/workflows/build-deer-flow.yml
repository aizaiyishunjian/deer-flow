name: Build and Export DeerFlow (Downloadable)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '要构建的分支或标签 (例如: main, v0.1.0)'
        required: true
        default: 'main'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # --- 任务 1: 构建并打包后端 ---
  build-and-export-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Build Backend
        run: |
          docker build -t deer-flow-backend:${{ github.event.inputs.version }} -f backend/Dockerfile .
          # 导出并压缩 (使用 gzip 减小体积)
          docker save deer-flow-backend:${{ github.event.inputs.version }} | gzip > deer-flow-backend.tar.gz

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deer-flow-backend-image
          path: deer-flow-backend.tar.gz
          retention-days: 1

  # --- 任务 2: 构建并打包前端 (最占空间) ---
  build-and-export-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Maximize space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android

      - name: Build Frontend
        run: |
          docker build -t deer-flow-frontend:${{ github.event.inputs.version }} \
            --build-arg PNPM_STORE_PATH=/root/.local/share/pnpm/store \
            --target prod -f frontend/Dockerfile .
          docker save deer-flow-frontend:${{ github.event.inputs.version }} | gzip > deer-flow-frontend.tar.gz

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deer-flow-frontend-image
          path: deer-flow-frontend.tar.gz
          retention-days: 1

  # --- 任务 3: 构建并打包Provisioner ---
  build-and-export-provisioner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Build Others
        run: |                
          # 构建 Provisioner
          docker build -t deer-flow-provisioner:${{ github.event.inputs.version }} -f docker/provisioner/Dockerfile ./docker/provisioner
          
          # 导出并压缩为一个包
          docker save deer-flow-provisioner:${{ github.event.inputs.version }} | gzip > deer-flow-provisioner.tar.gz

      - name: Upload Provisioner Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deer-flow-provisioner-image
          path: deer-flow-provisioner.tar.gz
          retention-days: 1
