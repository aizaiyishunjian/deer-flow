name: Build and Export DeerFlow (Downloadable)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '要构建的分支或标签 (例如: main, v0.1.0)'
        required: true
        default: 'main'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # --- 任务 1: 构建并打包后端 ---
  build-and-export-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Build Backend
        run: |
          docker build -t deer-flow-backend:${{ github.event.inputs.version }} -f backend/Dockerfile .
          # 导出并压缩 (使用 gzip 减小体积)
          docker save deer-flow-backend:${{ github.event.inputs.version }} | gzip > deer-flow-backend.tar.gz

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deer-flow-backend-image
          path: deer-flow-backend.tar.gz
          retention-days: 1
