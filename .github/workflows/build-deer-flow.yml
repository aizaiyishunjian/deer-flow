name: Build DeerFlow Images (Separated Jobs)

on:
  workflow_dispatch: # 允许手动点击运行

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # 任务 1: 构建后端
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:latest

  # 任务 2: 构建前端 (最占空间和时间)
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Maximize space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          target: prod
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest
          build-args: |
            PNPM_STORE_PATH=/root/.local/share/pnpm/store

  # 任务 3: 构建 Nginx 和其他
  build-others:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Nginx
        run: |
          cat <<EOF > Nginx.Dockerfile
          FROM nginx:alpine
          COPY docker/nginx/nginx.conf /etc/nginx/nginx.conf
          EOF
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nginx:latest -f Nginx.Dockerfile .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nginx:latest
      - name: Build Provisioner
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/provisioner:latest -f docker/provisioner/Dockerfile ./docker/provisioner
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/provisioner:latest
